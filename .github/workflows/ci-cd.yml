name: CI/CD

on:
  push:
    branches: [main]

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Step 1 — Lint with flake8 ─────────────────────────────────────────
      - name: Lint with flake8
        run: |
          flake8 noshow_iq/ tests/ \
            --max-line-length=100 \
            --exclude=venv,__pycache__

      # ── Step 2 — Run pytest ───────────────────────────────────────────────
      - name: Run pytest
        run: pytest tests/ -v

      # ── Step 3 — Build Docker image ───────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/noshow-iq:latest .

      # ── Step 4 — Push to Docker Hub ───────────────────────────────────────
      - name: Push to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/noshow-iq:latest

      # ── Step 5 — Trigger Hugging Face Space rebuild ───────────────────────
      - name: Trigger HF Space rebuild
        run: |
          curl -X POST \
            "https://huggingface.co/api/spaces/${{ secrets.HF_USERNAME }}/noshow-iq/restart" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"
